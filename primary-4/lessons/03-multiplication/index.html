<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multi-digit Multiplication</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    #area { display: block; margin: 0 auto; }
    .reg-label { font-weight: 800; fill: #22324a; font-size: 15px; }
    .axis-label { font-weight: 800; fill: var(--brand-dk); font-size: 15px; }
    .slider-row { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .slider-row b { color: var(--brand-dk); font-size: 1.2rem; }
    .pp-list { list-style: none; padding: 0; max-width: 360px; margin: 10px auto; }
    .pp-list li { display: flex; justify-content: space-between; padding: 8px 14px; border-radius: 10px;
      border: 2px solid var(--line); margin: 6px 0; font-weight: 700; opacity: .35; transition: opacity .3s; }
    .pp-list li.show { opacity: 1; background: #f7faff; }
    .pp-list li b { color: var(--brand-dk); }
  </style>
</head>
<body data-lesson="3">
  <main>
    <section class="panel">
      <h2 data-i18n="ui.concept"></h2>
      <div class="with-mascot">
        <div data-mascot="left"></div>
        <div class="copy">
          <p class="lead" data-i18n="l3.intro"></p>
          <p data-i18n="l3.intro2"></p>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="ui.explore"></h2>
      <p class="muted center" data-i18n="l3.hint"></p>
      <div class="stage">
        <svg id="area" width="420" height="300" viewBox="0 0 420 300" aria-hidden="true"></svg>
      </div>
      <div class="controls">
        <div class="slider-row"><label data-i18n="l3.factor1"></label><b id="vf1">23</b>
          <input type="range" id="sf1" min="11" max="99" value="23"></div>
        <div class="slider-row"><label data-i18n="l3.factor2"></label><b id="vf2">14</b>
          <input type="range" id="sf2" min="2" max="29" value="14"></div>
      </div>
      <div class="readout" id="prod"></div>
      <div class="muted center" id="sum-line"></div>
    </section>

    <section class="panel">
      <h2 data-i18n="ui.example"></h2>
      <p data-i18n="l3.exTip"></p>
      <ul class="pp-list" id="pp"></ul>
      <div class="row"><button class="btn accent" id="ex-play" data-i18n="ui.play"></button></div>
      <p class="readout" id="ex-total"></p>
    </section>

    <section class="panel">
      <h2 data-i18n="ui.tryIt"></h2>
      <div id="quiz"></div>
    </section>
  </main>

  <script src="../../assets/js/lessons-data.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../../assets/js/widgets.js"></script>
  <script src="../../assets/js/mascot.js"></script>
  <script src="../../assets/js/lesson.js"></script>
  <script>
  (function () {
    I18N.register({
      "l3.intro":  { en: "To multiply big numbers, split each factor by place value and multiply the parts. The <b>area model</b> draws this as a rectangle cut into smaller boxes.",
                     zh: "計算大數相乘時，把每個因數按位值拆開，再分別相乘。<b>面積模型</b>把它畫成一個切成小格的長方形。" },
      "l3.intro2": { en: "The same idea works for 3-digit × 2-digit, like 234 × 12 — just more boxes!",
                     zh: "同樣的方法也適用於三位數乘兩位數，例如 234 × 12 — 只是格子更多！" },
      "l3.hint":   { en: "Drag the sliders to change the two factors. Each coloured box is a partial product.",
                     zh: "拖動滑桿改變兩個因數。每個彩色方格就是一個部分積。" },
      "l3.factor1":{ en: "First factor", zh: "第一個因數" },
      "l3.factor2":{ en: "Second factor", zh: "第二個因數" },
      "l3.exTip":  { en: "Build 23 × 14 from four partial products. Press Play to add them up.",
                     zh: "用四個部分積組成 23 × 14。按「播放」把它們加起來。" }
    });

    var NS = "http://www.w3.org/2000/svg";
    function elNS(t, a, txt) { var e = document.createElementNS(NS, t); for (var k in a) e.setAttribute(k, a[k]);
      if (txt != null) e.textContent = txt; return e; }
    var FILL = ["#bcd4fb", "#ffd2e0", "#fff0b8", "#c9efd8"];

    var f1 = 23, f2 = 14;
    var area = document.getElementById("area");

    function parts(n) { return { t: Math.floor(n / 10) * 10, o: n % 10 }; }

    function render() {
      while (area.firstChild) area.removeChild(area.firstChild);
      var P1 = parts(f1), P2 = parts(f2);
      var colVals = [P1.t, P1.o].filter(function (v) { return v > 0; });
      var rowVals = [P2.t, P2.o].filter(function (v) { return v > 0; });
      var ox = 60, oy = 30, maxW = 320, maxH = 210;
      var totW = colVals.reduce(function (s, v) { return s + v; }, 0);
      var totH = rowVals.reduce(function (s, v) { return s + v; }, 0);
      var sx = maxW / totW, sy = maxH / totH;

      var y = oy;
      rowVals.forEach(function (rv) {
        var x = ox, hh = rv * sy;
        colVals.forEach(function (cv, ci) {
          var ww = cv * sx;
          area.appendChild(elNS("rect", { x: x, y: y, width: ww, height: hh,
            fill: FILL[(rowVals.indexOf(rv) * colVals.length + ci) % FILL.length],
            stroke: "#3a6fd0", "stroke-width": 1.5 }));
          var t = elNS("text", { x: x + ww / 2, y: y + hh / 2 + 5, "text-anchor": "middle", "class": "reg-label" },
            (cv * rv).toString());
          area.appendChild(t);
          x += ww;
        });
        y += hh;
      });
      // axis labels (column widths on top, row heights on left)
      var xx = ox;
      colVals.forEach(function (cv) { var ww = cv * sx;
        area.appendChild(elNS("text", { x: xx + ww / 2, y: oy - 10, "text-anchor": "middle", "class": "axis-label" }, "" + cv));
        xx += ww; });
      var yy = oy;
      rowVals.forEach(function (rv) { var hh = rv * sy;
        area.appendChild(elNS("text", { x: ox - 14, y: yy + hh / 2 + 5, "text-anchor": "end", "class": "axis-label" }, "" + rv));
        yy += hh; });

      document.getElementById("prod").textContent = f1 + " × " + f2 + " = " + (f1 * f2);
      var terms = [];
      rowVals.forEach(function (rv) { colVals.forEach(function (cv) { terms.push(cv * rv); }); });
      document.getElementById("sum-line").textContent = terms.join(" + ") + " = " + (f1 * f2);
    }

    function bind(id, vid, set) {
      var s = document.getElementById(id), v = document.getElementById(vid);
      s.addEventListener("input", function () { set(parseInt(s.value, 10)); v.textContent = s.value; render(); });
    }
    bind("sf1", "vf1", function (n) { f1 = n; });
    bind("sf2", "vf2", function (n) { f2 = n; });

    // ---- worked example 23 × 14 ----
    var pp = [
      { mul: "20 × 10", val: 200 }, { mul: "20 × 4", val: 80 },
      { mul: "3 × 10", val: 30 }, { mul: "3 × 4", val: 12 }
    ];
    var ppHost = document.getElementById("pp");
    var liEls = pp.map(function (p) {
      var li = document.createElement("li");
      li.innerHTML = "<span>" + p.mul + "</span><b>" + p.val + "</b>";
      ppHost.appendChild(li); return li;
    });
    var total = document.getElementById("ex-total");
    document.getElementById("ex-play").addEventListener("click", function () {
      liEls.forEach(function (e) { e.classList.remove("show"); });
      total.textContent = ""; var i = 0, run = 0;
      (function step() {
        if (i >= pp.length) {
          total.textContent = I18N.pick("Total: 23 × 14 = 322", "總和：23 × 14 = 322"); return;
        }
        liEls[i].classList.add("show"); run += pp[i].val;
        total.textContent = I18N.pick("Running total: " + run, "累計：" + run);
        i++; setTimeout(step, 1000);
      })();
    });

    NL.quiz(document.getElementById("quiz"), [
      { prompt: { en: "What is 23 × 14?", zh: "23 × 14 等於多少？" },
        options: ["322", "312", "92", "332"], answer: 0,
        explain: { en: "200 + 80 + 30 + 12 = 322.", zh: "200 + 80 + 30 + 12 = 322。" } },
      { prompt: { en: "In the area model for 23 × 14, what is the box 20 × 4?", zh: "在 23 × 14 的面積模型中，方格 20 × 4 是多少？" },
        options: ["80", "24", "60", "800"], answer: 0,
        explain: { en: "20 × 4 = 80.", zh: "20 × 4 = 80。" } },
      { prompt: { en: "What is 34 × 12?", zh: "34 × 12 等於多少？" },
        options: ["408", "68", "380", "418"], answer: 0,
        explain: { en: "300 + 60 + 40 + 8 = 408.", zh: "300 + 60 + 40 + 8 = 408。" } }
    ]);

    document.addEventListener("langchange", function () {
      render();
      if (total.textContent) { /* leave example total until replayed */ }
    });
    render();
    if (window.mascot) window.mascot.say("Big multiplications? Just split and add!", "大乘法？拆開再相加就行！");
  })();
  </script>
</body>
</html>
